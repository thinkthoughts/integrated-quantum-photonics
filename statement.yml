id: integrated-quantum-photonics
title: Integrated Quantum Photonics
subtitle: From frequency multiplexing to squeezed microcombs, cluster states, and loss-limited scaling
status: draft
source: CU seminar
speaker: Xu Yi
institution: University of Virginia
repo: https://github.com/thinkthoughts/integrated-quantum-photonics
summary: >
  Executable notebooks for reasoning through integrated quantum photonics:
  scaling pressure, frequency multiplexing, quantum frequency combs,
  Kerr nonlinear interaction, two-mode squeezing, many-mode entanglement,
  integrated photonic circuits, loss characterization, cluster-state architectures,
  and quantum error-correction thresholds.
core_claim: >
  Frequency multiplexing creates modal abundance, but useful quantum scale
  requires squeezing, loss control, integrated measurement, and multipartite
  graph-state architecture.
